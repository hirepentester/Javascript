spec:
  name: ml-javascript-analyzer

  workers:
  - name: analyzer
    environment_slug: python
    git:
      branch: deploy
      repo_clone_url: https://github.com/hirepentester/Javascript.git
    source_dir: /
    build_command: "pip install -r requirements.txt"
    run_command: "python ml_analyzer.py --analyze-all"
    instance_count: 1
    envs:
      - key: PROCESSING_MODE
        value: batch
      - key: BATCH_SIZE
        value: "32"
      - key: LOG_LEVEL
        value: INFO