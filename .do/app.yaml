name: ml-javascript-analyzer
workers:
- name: analyzer
  environment_slug: python
  github:
    repo: hirepentester/Javascript
    branch: deploy
    deploy_on_push: true
  source_dir: /
  build_command: "pip install -r requirements.txt"
  run_command: "python ml_analyzer.py --analyze-all"
  instance_count: 1
  envs:
    - key: PROCESSING_MODE
      value: batch
    - key: BATCH_SIZE
      value: "32"
    - key: LOG_LEVEL
      value: INFO